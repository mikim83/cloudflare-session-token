name = "session-token-worker"
main = "src/index.js"
compatibility_date = "2024-01-01"

kv_namespaces = [
  { binding = "SESSIONS", id = "eb6ed500a24545908ce73761e91788b7" }
]

routes = [
  { pattern = "meteo.dob-world.com/*", zone_name = "dob-world.com" }
]

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1
